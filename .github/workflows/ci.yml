name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  unit-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @taskflow/backend exec prisma generate

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  e2e:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.3

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @taskflow/web exec playwright install --with-deps chromium

      - name: Create .env
        run: cp .env.example .env

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for services
        run: npx wait-on http://localhost:3000 http://localhost:3001/health --timeout 60000

      - name: Run e2e
        run: pnpm test:e2e

      - name: Teardown
        if: always()
        run: docker compose down
